<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky Realtime Dashboard</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:20px}

h2{margin-bottom:10px}

select{
  padding:6px 10px;
  margin-bottom:15px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{background:#e5e7eb}

.building{
  background:#f1f5f9;
  font-weight:bold;
}

.info{
  text-align:left;
  font-size:13px;
}

img{
  width:120px;
  border-radius:6px;
}

.red{color:red;font-weight:bold}
.green{color:#16a34a;font-weight:bold}
</style>

</head>

<body>

<h2>🏢 PaxSky Leasing Realtime</h2>

<select id="filter">
<option value="">Tất cả khu vực</option>
</select>

<table id="table">
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Giá thuê</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// 🔥 LINK SHEET
const url="https://opensheet.elk.sh/1IfJYtpt-C55rAqNV-QntBCFWyc6qG4nXCpBCSO1aJRU/DATA_ToaNha";

let raw=[];

// LOAD DATA
fetch(url)
.then(r=>r.json())
.then(data=>{
  raw=data;
  initFilter();
  render(data);
});

// FILTER
function initFilter(){
  let list=[...new Set(raw.map(x=>x["Khu Vực"]))];

  let f=document.getElementById("filter");

  f.innerHTML='<option value="">Tất cả khu vực</option>'+
    list.map(x=>`<option>${x}</option>`).join("");

  f.onchange=()=>{
    let val=f.value;
    render(val?raw.filter(x=>x["Khu Vực"]===val):raw);
  }
}

// RENDER TABLE
function render(data){

  let tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  let group={};

  // GROUP BY TÒA
  data.forEach(r=>{
    let ten=r["Tên Tòa Nhà"];

    if(!group[ten]) group[ten]=[];
    group[ten].push(r);
  });

  // RENDER
  for(let building in group){

    let rows=group[building];

    // HEADER BUILDING
    tbody.innerHTML+=`
    <tr class="building">
      <td colspan="8">${building}</td>
    </tr>`;

    rows.forEach(r=>{

      let gia=+r["Giá thuê (USD/m2)"]||0;
      let dienTich=+r["Diện tích trống (m2)"]||0;

      let giaThue=(gia*dienTich*24000).toLocaleString();

      tbody.innerHTML+=`
      <tr>
        <td>${building}</td>
        <td>${r["Tầng"]||"-"}</td>
        <td>${dienTich}</td>
        <td>${gia}</td>
        <td class="red">${gia-3 || ""}</td>
        <td>4</td>
        <td>${giaThue}</td>
        <td class="green">TRỐNG</td>
      </tr>`;
    });

  }

}

</script>

</body>
</html>
