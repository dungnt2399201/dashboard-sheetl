<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tòa Nhà PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2f7;
}

.dashboard {
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:15px;
}

.card {
  padding:18px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.blue{background:#1e88e5}
.green{background:#43a047}
.orange{background:#fb8c00}
.red{background:#e53935}

.value {font-size:22px; margin-top:8px}

.chart-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.chart-box {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.chart-box canvas {
  max-height:300px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th {background:#f1f3f6}

@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr}
  .chart-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="dashboard">

<h2>📊 Overview Quản Lý Cho Thuê Văn Phòng Paxsky</h2>

<div>
  Khu vực:
  <select id="filter"></select>
</div>

<div class="grid">
  <div class="card blue">Tổng diện tích<div id="tong" class="value"></div></div>
  <div class="card green">Giá TB<div id="gia" class="value"></div></div>
  <div class="card orange">Đã thuê<div id="da" class="value"></div></div>
  <div class="card red">Còn trống<div id="trong" class="value"></div></div>
</div>

<div class="chart-grid">
  <div class="chart-box">
    <h4>Tỷ lệ lấp đầy</h4>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="chart-box">
    <h4>Diện tích trống theo tòa</h4>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div class="chart-box">
  <h4>Xu hướng giá & lấp đầy</h4>
  <canvas id="trendChart"></canvas>
</div>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Khu vực</th>
<th>Tổng</th>
<th>Đã thuê</th>
<th>Còn trống</th>
<th>Giá</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

</div>

<script>
const urlMain = "https://opensheet.elk.sh/1H-CoUspE2Zk2wNPcXyx8NpPoUUe5hLYNPiQsAmpPErg/DATA_ToaNha";
const urlTrend = "https://opensheet.elk.sh/1H-CoUspE2Zk2wNPcXyx8NpPoUUe5hLYNPiQsAmpPErg/Xu_HUONG";

let rawData=[], pieChart, barChart, trendChart;

// LOAD DATA
fetch(urlMain)
.then(res=>res.json())
.then(data=>{
  rawData=data;
  initFilter();
  render(data);
});

// FILTER
function initFilter(){
  let list=[...new Set(rawData.map(x=>x["Khu Vực"]))];
  let f=document.getElementById("filter");

  f.innerHTML='<option value="">Tất cả</option>' +
  list.map(x=>`<option>${x}</option>`).join("");

  f.onchange=()=>{
    let val=f.value;
    let d=val?rawData.filter(x=>x["Khu Vực"]===val):rawData;
    render(d);
  }
}

// RENDER MAIN
function render(data){

  let tong=0,da=0,trong=0,gia=0;
  let html="";
  let labels=[],dataBar=[];

  data.forEach(r=>{
    let t=+r["Tổng diện tích (m2)"]||0;
    let d=+r["Diện tích đã cho thuê (m2)"]||0;
    let c=+r["Diện tích trống (m2)"]||0;
    let g=+r["Giá thuê (USD/m2)"]||0;

    tong+=t; da+=d; trong+=c; gia+=g;

    labels.push(r["Tên Tòa Nhà"]);
    dataBar.push(c);

    html+=`
    <tr>
      <td>${r["Tên Tòa Nhà"]}</td>
      <td>${r["Khu Vực"]}</td>
      <td>${t}</td>
      <td>${d}</td>
      <td>${c}</td>
      <td>${g}</td>
    </tr>`;
  });

  gia=data.length?gia/data.length:0;

  document.getElementById("tong").innerText=tong.toLocaleString();
  document.getElementById("gia").innerText=gia.toFixed(0);
  document.getElementById("da").innerText=da.toLocaleString();
  document.getElementById("trong").innerText=trong.toLocaleString();
  document.getElementById("tableData").innerHTML=html;

  // PIE
  let rate=tong?(da/tong*100):0;
  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById("pieChart"),{
    type:'pie',
    data:{labels:["Đã thuê","Còn trống"],datasets:[{data:[rate,100-rate]}]}
  });

  // BAR
  if(barChart) barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{labels:labels,datasets:[{label:"Diện tích trống",data:dataBar}]}
  });
}

// TREND CHART PRO
if(trendChart) trendChart.destroy();

trendChart = new Chart(document.getElementById("trendChart"),{
  data:{
    labels:months,
    datasets:[
      {
        type:'line',
        label:'Giá thuê (USD/m²)',
        data:giaTB,
        borderWidth:3,
        tension:0.4,
        yAxisID:'y1',
        borderColor:'#2563eb',
        backgroundColor:'#2563eb',
        pointRadius:4,
        pointHoverRadius:6
      },
      {
        type:'bar',
        label:'Tỷ lệ lấp đầy (%)',
        data:tyLe,
        yAxisID:'y',
        backgroundColor:'#22c55e',
        borderRadius:6,
        barThickness:30
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,

    interaction:{
      mode:'index',
      intersect:false
    },

    plugins:{
      legend:{
        position:'bottom',
        labels:{
          usePointStyle:true,
          padding:15
        }
      },
      tooltip:{
        callbacks:{
          label:function(context){
            let label = context.dataset.label || '';
            let value = context.raw;

            if(label.includes('Giá')){
              return label + ': ' + value + ' USD';
            }
            return label + ': ' + value + '%';
          }
        }
      }
    },

    scales:{
      x:{
        grid:{display:false}
      },

      y:{
        beginAtZero:true,
        position:'left',
        title:{
          display:true,
          text:'% Lấp đầy'
        },
        ticks:{
          callback:(v)=> v + '%'
        }
      },

      y1:{
        beginAtZero:false,
        position:'right',
        title:{
          display:true,
          text:'USD/m²'
        },
        grid:{
          drawOnChartArea:false
        },
        ticks:{
          callback:(v)=> v + ' USD'
        }
      }
    }
  }
});
</script>

</body>
</html>
