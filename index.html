<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f7;margin:0}
.container{max-width:1300px;margin:auto;padding:20px}

h1{text-align:center;margin-bottom:20px}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px
}
.card{
padding:20px;
border-radius:12px;
color:#fff;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.1)
}
.blue{background:linear-gradient(135deg,#3b82f6,#1e3a8a)}
.green{background:linear-gradient(135deg,#22c55e,#166534)}
.orange{background:linear-gradient(135deg,#f59e0b,#b45309)}
.red{background:linear-gradient(135deg,#ef4444,#991b1b)}

.value{font-size:26px;margin-top:10px}

/* GRID */
.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px
}

/* BOX */
.box{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05)
}

#pie{max-height:250px}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#fff
}
th,td{
border:1px solid #ddd;
padding:10px;
text-align:center
}
th{background:#e5e7eb}

.building{
background:#dbeafe;
font-weight:bold
}

.greenText{color:#16a34a;font-weight:bold}
.redText{color:#dc2626;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h1>📊 Tổng quan cho thuê văn phòng</h1>

<!-- KPI -->
<div class="kpi">
<div class="card blue">Tổng diện tích<div id="tong" class="value"></div></div>
<div class="card green">Giá TB<div id="gia" class="value"></div></div>
<div class="card orange">Đã thuê<div id="da" class="value"></div></div>
<div class="card red">
Còn trống
<div id="trong" class="value"></div>
<div id="doanh"></div>
</div>
</div>

<!-- CHART -->
<div class="row">

<div class="box">
<h3>Tỷ lệ theo tòa</h3>
<canvas id="bar"></canvas>
</div>

<div class="box">
<h3>Tổng quan</h3>
<canvas id="pie"></canvas>
<h2 id="doanh2" style="text-align:center;margin-top:10px"></h2>
</div>

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Giá thuê</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

let barChart,pieChart;

fetch(API)
.then(r=>r.json())
.then(data=>{

let tong=0,trong=0,da=0,gia=0,doanh=0;
let mapTrong={},mapDa={};

let html="";
let current="";

data.forEach(r=>{

let dt=Number(r.dientich)||0;
let g=Number(r.gia)||0;

let isTrong=(r.trangthai||"").includes("TRỐNG");

if(isTrong){
trong+=dt;
mapTrong[r.toa]=(mapTrong[r.toa]||0)+dt;
}else{
da+=dt;
mapDa[r.toa]=(mapDa[r.toa]||0)+dt;
}

tong+=dt;
gia+=g;
doanh+=dt*g*24000;

// group theo tòa
if(current!==r.toa){
current=r.toa;
html+=`<tr class="building"><td colspan="8">${current}</td></tr>`;
}

html+=`
<tr>
<td>${r.toa}</td>
<td>${r.tang}</td>
<td>${dt.toLocaleString()}</td>
<td>${g}</td>
<td class="redText">${r.uudai||""}</td>
<td>${r.phi||""}</td>
<td>${(dt*g*24000).toLocaleString()}</td>
<td class="greenText">${r.trangthai}</td>
</tr>`;
});

document.getElementById("tbody").innerHTML=html;

// KPI
let fill=(da/tong*100)||0;

document.getElementById("tong").innerText=tong.toLocaleString()+" m²";
document.getElementById("gia").innerText=(gia/data.length).toFixed(1)+" USD";
document.getElementById("da").innerText=da.toLocaleString()+" m²";
document.getElementById("trong").innerText=trong.toLocaleString()+" m²";
document.getElementById("doanh").innerText="Doanh thu: "+doanh.toLocaleString()+" VND";
document.getElementById("doanh2").innerText=doanh.toLocaleString()+" VND";

// destroy chart cũ
if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();

let buildings=[...new Set(data.map(x=>x.toa))];

// BAR
barChart=new Chart(bar,{
type:'bar',
data:{
labels:buildings,
datasets:[
{
label:'Đã thuê',
data:buildings.map(x=>mapDa[x]||0),
backgroundColor:'#3b82f6'
},
{
label:'Còn trống',
data:buildings.map(x=>mapTrong[x]||0),
backgroundColor:'#f59e0b'
}
]
}
});

// PIE
pieChart=new Chart(pie,{
type:'pie',
data:{
labels:['Đã thuê','Còn trống'],
datasets:[{
data:[da,trong],
backgroundColor:['#3b82f6','#f59e0b']
}]
}
});

})
.catch(err=>{
console.error(err);
alert("❌ Lỗi API hoặc dữ liệu");
});

</script>

</body>
</html>
