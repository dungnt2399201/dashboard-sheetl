<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tòa Nhà</title>

<style>
body {font-family:Arial; background:#f4f7fb; margin:0}
.dashboard {max-width:1200px; margin:auto; padding:20px}
.grid {display:grid; grid-template-columns:repeat(4,1fr); gap:10px}
.card {
  padding:15px; border-radius:10px; color:#fff; font-weight:bold
}
.blue{background:#1e88e5}
.green{background:#43a047}
.orange{background:#fb8c00}
.red{background:#e53935}

.value {font-size:24px; margin-top:10px}

table {width:100%; border-collapse:collapse; margin-top:20px; background:#fff}
th, td {border:1px solid #ddd; padding:10px; text-align:center}
th {background:#eee}
</style>
</head>

<body>

<div class="dashboard">

<h2>📊 Dashboard Tòa Nhà (Realtime)</h2>

<div class="grid">
  <div class="card blue">
    Tổng diện tích
    <div class="value" id="tong"></div>
  </div>

  <div class="card green">
    Giá thuê TB
    <div class="value" id="gia"></div>
  </div>

  <div class="card orange">
    Đã thuê
    <div class="value" id="da"></div>
  </div>

  <div class="card red">
    Còn trống
    <div class="value" id="trong"></div>
    <div id="doanhThu"></div>
  </div>
</div>

<h3>Bảng chi tiết</h3>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tổng</th>
<th>Đã thuê</th>
<th>Còn trống</th>
<th>Giá</th>
<th>Doanh thu</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

</div>

<script>
const url = "https://opensheet.elk.sh/1H-CoUspE2Zk2wNPcXyx8NpPoUUe5hLYNPiQsAmpPErg/DATA_ToaNha";

fetch(url)
.then(res => res.json())
.then(data => {

  let tong=0, da=0, trong=0, doanhThu=0, gia=0;
  let html = "";

data.forEach(row => {

  let cols = Object.values(row);

  let ten = cols[0] || "";
  let c = parseFloat(cols[1]) || 0;
  let g = parseFloat(cols[2]) || 0;

  let t = c;
  let d = 0;

  let dt = c * g;

  tong += t;
  da += d;
  trong += c;
  doanhThu += dt;
  gia += g;

  html += `
    <tr>
      <td>${ten}</td>
      <td>${t.toLocaleString()}</td>
      <td>${d}</td>
      <td>${c.toLocaleString()}</td>
      <td>${g}</td>
      <td>${dt.toLocaleString()}</td>
    </tr>
  `;
});

  gia = gia / data.length;

  document.getElementById("tong").innerText = tong.toLocaleString() + " m²";
  document.getElementById("gia").innerText = gia.toFixed(0) + " USD";
  document.getElementById("da").innerText = da.toLocaleString() + " m²";
  document.getElementById("trong").innerText = trong.toLocaleString() + " m²";
  document.getElementById("doanhThu").innerText = "Doanh thu: " + doanhThu.toLocaleString() + " USD";

  document.getElementById("tableData").innerHTML = html;

})
.catch(err => console.error(err));
</script>
