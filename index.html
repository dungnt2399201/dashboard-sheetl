<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Tòa Nhà</title>

<style>
body {font-family:Arial; background:#f4f7fb; margin:0}
.dashboard {max-width:1200px; margin:auto; padding:20px}
.grid {display:grid; grid-template-columns:repeat(4,1fr); gap:10px}
.card {
  padding:15px; border-radius:10px; color:#fff; font-weight:bold
}
.blue{background:#1e88e5}
.green{background:#43a047}
.orange{background:#fb8c00}
.red{background:#e53935}
.value {font-size:24px; margin-top:10px}

table {width:100%; border-collapse:collapse; margin-top:20px; background:#fff}
th, td {border:1px solid #ddd; padding:10px; text-align:center}
th {background:#eee}
</style>
</head>

<body>

<div class="dashboard">

<h2>📊 Dashboard Tòa Nhà (Realtime)</h2>

<div class="grid">
  <div class="card blue">
    Tổng diện tích
    <div class="value" id="tong">0</div>
  </div>

  <div class="card green">
    Giá thuê TB
    <div class="value" id="gia">0</div>
  </div>

  <div class="card orange">
    Đã thuê
    <div class="value" id="da">0</div>
  </div>

  <div class="card red">
    Còn trống
    <div class="value" id="trong">0</div>
    <div id="doanhThu"></div>
  </div>
</div>

<h3>Bảng chi tiết</h3>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tổng</th>
<th>Đã thuê</th>
<th>Còn trống</th>
<th>Giá</th>
<th>Doanh thu</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

</div>

<script>
const url = "https://opensheet.elk.sh/1H-CoUspE2Zk2wNPcXyx8NpPoUUe5hLYNPiQsAmpPErg/DATA_ToaNha";

fetch(url)
.then(res => res.json())
.then(data => {

  console.log("DATA:", data);

  let tong=0, da=0, trong=0, doanhThu=0, gia=0;
  let html = "";

  data.forEach(row => {

    let cols = Object.values(row).map(v =>
      typeof v === "string" ? v.replace(/,/g, "") : v
    );

    let ten = cols[0] || "";
    let tongToa = parseFloat(cols[3]) || 0;
    let daThue = parseFloat(cols[4]) || 0;
    let conTrong = parseFloat(cols[5]) || 0;
    let giaThue = parseFloat(cols[7]) || 0;

    let dt = conTrong * giaThue;

    tong += tongToa;
    da += daThue;
    trong += conTrong;
    doanhThu += dt;
    gia += giaThue;

    html += `
      <tr>
        <td>${ten}</td>
        <td>${tongToa.toLocaleString()}</td>
        <td>${daThue.toLocaleString()}</td>
        <td>${conTrong.toLocaleString()}</td>
        <td>${giaThue}</td>
        <td>${dt.toLocaleString()}</td>
      </tr>
    `;
  });

  gia = data.length ? gia / data.length : 0;

  document.getElementById("tong").innerText = tong.toLocaleString() + " m²";
  document.getElementById("gia").innerText = gia.toFixed(0) + " USD";
  document.getElementById("da").innerText = da.toLocaleString() + " m²";
  document.getElementById("trong").innerText = trong.toLocaleString() + " m²";
  document.getElementById("doanhThu").innerText =
    "Doanh thu: " + doanhThu.toLocaleString() + " USD";

  document.getElementById("tableData").innerHTML = html;

})
.catch(err => console.error("Lỗi:", err));
</script>
