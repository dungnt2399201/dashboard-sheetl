<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky Realtime PRO</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:20px}

h2{margin-bottom:10px}

select{
  padding:6px 10px;
  margin-bottom:15px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{background:#e5e7eb}

.building{
  background:#e0f2fe;
  font-weight:bold;
}

.red{color:red;font-weight:bold}
.green{color:#16a34a;font-weight:bold}
</style>

</head>

<body>

<h2>🏢 PaxSky Leasing Realtime</h2>

<select id="filter"></select>

<table>
<thead>
<tr>
<th>Tòa nhà</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Giá thuê</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

// ✅ FIX ENCODE SHEET NAME
const url="https://opensheet.elk.sh/1IfJYtpt-C55rAqNV-QntBCFWyc6qG4nXCpBCSO1aJRU/PAXSKYSG";

let raw=[];

// LOAD DATA
fetch(url)
.then(r=>r.json())
.then(data=>{
  raw=data;
  initFilter();
  render(data);
});

// FILTER (nếu có cột khu vực thì dùng, không thì bỏ)
function initFilter(){
  let f=document.getElementById("filter");
  f.innerHTML='<option value="">Tất cả</option>';
}

// RENDER
function render(data){

  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  let group={};

  // 🔥 GROUP THEO TÒA (ĐÚNG CỘT)
  data.forEach(r=>{
    let ten=r["THÔNG TIN TÒA NHÀ"] || "N/A";

    if(!group[ten]) group[ten]=[];
    group[ten].push(r);
  });

  for(let building in group){

    tbody.innerHTML+=`
    <tr class="building">
      <td colspan="8">${building}</td>
    </tr>`;

    group[building].forEach(r=>{

      let tang=r["TẦNG"]||"-";
      let dienTich=+r["DIỆN TÍCH TRỐNG (m2)"]||0;
      let gia=+r["GIÁ THUÊ ($ /m2)"]||0;
      let giaUuDai=+r["GIÁ THUÊ ƯU ĐÃI ($/m2)"]||0;
      let phi=+r["PHÍ QUẢN LÝ"]||0;

      let giaThue=(gia*dienTich*24000).toLocaleString();

      let status=r["TÌNH TRẠNG"]||"TRỐNG";

      tbody.innerHTML+=`
      <tr>
        <td>${building}</td>
        <td>${tang}</td>
        <td>${dienTich}</td>
        <td>${gia}</td>
        <td class="red">${giaUuDai||""}</td>
        <td>${phi}</td>
        <td>${giaThue}</td>
        <td class="green">${status}</td>
      </tr>`;
    });
  }
}

</script>

</body>
</html>
