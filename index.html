<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaxSky Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
.dashboard{max-width:1400px;margin:auto;padding:20px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.value{font-size:22px;font-weight:bold}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.chart-box{background:#fff;padding:15px;border-radius:12px}

table{width:100%;margin-top:20px;border-collapse:collapse;background:#fff}
th,td{padding:10px;border:1px solid #ddd;text-align:center}
</style>
</head>

<body>

<div class="dashboard">

<h2>📊 PaxSky Dashboard</h2>

<select id="filter"></select>

<div class="grid">
  <div class="card">Tổng diện tích<div id="tong" class="value"></div></div>
  <div class="card">Giá TB<div id="gia" class="value"></div></div>
  <div class="card">Đã thuê<div id="da" class="value"></div></div>
  <div class="card">Còn trống<div id="trong" class="value"></div></div>
</div>

<div class="chart-grid">
  <div class="chart-box"><canvas id="pieChart"></canvas></div>
  <div class="chart-box"><canvas id="barChart"></canvas></div>
</div>

<div class="chart-box">
  <canvas id="trendChart"></canvas>
</div>

<table>
<thead>
<tr>
<th>Tòa</th><th>Khu vực</th><th>Tổng</th><th>Đã thuê</th><th>Còn trống</th><th>Giá</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

</div>

<script>

// 🔥 THAY ID SHEET Ở ĐÂY
const SHEET_ID = "1IfJYtpt-C55rAqNV-QntBCFWyc6qG4nXCpBCSO1aJRU";

const urlMain = `https://opensheet.elk.sh/${1IfJYtpt-C55rAqNV-QntBCFWyc6qG4nXCpBCSO1aJRU}/PAX SKY SG`;

let rawData=[],pieChart,barChart,trendChart;

// LOAD MAIN
fetch(urlMain)
.then(r=>r.json())
.then(data=>{
  rawData=data;
  initFilter();
  render(data);
});

// FILTER
function initFilter(){
  let list=[...new Set(rawData.map(x=>x["Khu Vực"]))];
  let f=document.getElementById("filter");

  f.innerHTML='<option value="">Tất cả</option>'+list.map(x=>`<option>${x}</option>`).join("");

  f.onchange=()=>{
    let val=f.value;
    render(val?rawData.filter(x=>x["Khu Vực"]===val):rawData);
  }
}

// RENDER
function render(data){

  let tong=0,da=0,trong=0,gia=0;
  let html="",labels=[],dataBar=[];

  data.forEach(r=>{
    let t=+r["Tổng diện tích (m2)"]||0;
    let d=+r["Diện tích đã cho thuê (m2)"]||0;
    let c=+r["Diện tích trống (m2)"]||0;
    let g=+r["Giá thuê (USD/m2)"]||0;

    tong+=t; da+=d; trong+=c; gia+=g;

    labels.push(r["Tên Tòa Nhà"]);
    dataBar.push(c);

    html+=`
    <tr>
      <td>${r["Tên Tòa Nhà"]}</td>
      <td>${r["Khu Vực"]}</td>
      <td>${t.toLocaleString()}</td>
      <td>${d.toLocaleString()}</td>
      <td>${c.toLocaleString()}</td>
      <td>${g}</td>
    </tr>`;
  });

  gia = data.length ? gia/data.length : 0;

  document.getElementById("tong").innerText=tong.toLocaleString()+" m²";
  document.getElementById("gia").innerText=gia.toFixed(1)+" USD";
  document.getElementById("da").innerText=da.toLocaleString()+" m²";
  document.getElementById("trong").innerText=trong.toLocaleString()+" m²";
  document.getElementById("tableData").innerHTML=html;

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById("pieChart"),{
    type:'pie',
    data:{
      labels:["Đã thuê","Còn trống"],
      datasets:[{data:[da,trong]}]
    }
  });

  if(barChart) barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{label:"Diện tích trống",data:dataBar}]
    }
  });
}

// TREND
fetch(urlTrend)
.then(r=>r.json())
.then(data=>{

  let months=[...new Set(data.map(x=>x["Tháng"]))];

  let giaTB=[],tyLe=[],growth=[];

  months.forEach((m,i)=>{
    let rows=data.filter(x=>x["Tháng"]===m);

    let avgGia = rows.reduce((a,b)=>a+(+b["Giá thuê TB (USD/m2)"]||0),0)/rows.length;

    let avgTyLe = rows.reduce((a,b)=>{
      let v=(b["Tỷ lệ lấp đầy (%)"]||"0").replace(",",".").replace("%","");
      return a+(+v);
    },0)/rows.length;

    avgGia = Number(avgGia.toFixed(1));
    avgTyLe = Number(avgTyLe.toFixed(1));

    giaTB.push(avgGia);
    tyLe.push(avgTyLe);

    growth.push(i ? Number(((avgGia-giaTB[i-1])/giaTB[i-1]*100).toFixed(1)) : 0);
  });

  trendChart=new Chart(document.getElementById("trendChart"),{
    data:{
      labels:months,
      datasets:[
        {
          type:'bar',
          label:'Lấp đầy %',
          data:tyLe,
          backgroundColor:'rgba(34,197,94,0.3)',
          barThickness:20,
          order:2
        },
        {
          type:'line',
          label:'Giá',
          data:giaTB,
          borderColor:'#2563eb',
          borderWidth:3,
          yAxisID:'y1',
          order:1
        },
        {
          type:'line',
          label:'Tăng trưởng %',
          data:growth,
          borderColor:'#f59e0b',
          borderDash:[5,5]
        }
      ]
    },
    options:{
      interaction:{mode:'index',intersect:false},
      scales:{
        y:{ticks:{callback:v=>v+'%'}},
        y1:{
          position:'right',
          grid:{drawOnChartArea:false},
          ticks:{callback:v=>v.toFixed(1)+' USD'}
        }
      }
    }
  });

});

</script>

</body>
</html>
