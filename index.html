<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaxSky Dashboard PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Segoe UI;
  background:#f1f5f9;
  margin:0;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h2{margin-bottom:15px}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.value{
  font-size:22px;
  font-weight:bold;
  margin-top:5px;
}

/* CHART */
.chart-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  padding:10px;
  border:1px solid #eee;
  text-align:center;
}

th{background:#e2e8f0}

.building{
  background:#dbeafe;
  font-weight:bold;
}

.green{color:#16a34a;font-weight:bold}
.red{color:#dc2626;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>🏢 PaxSky Leasing Dashboard</h2>

<div class="kpi">
  <div class="card">Tổng diện tích<div id="tong" class="value">0</div></div>
  <div class="card">Tổng trống<div id="trong" class="value">0</div></div>
  <div class="card">Giá TB<div id="gia" class="value">0</div></div>
  <div class="card">Doanh thu<div id="doanhthu" class="value">0</div></div>
</div>

<div class="chart-box">
  <canvas id="chartBar"></canvas>
</div>

<div class="chart-box">
  <canvas id="chartPie"></canvas>
</div>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Giá thuê</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

let chartBar=null;
let chartPie=null;

fetch(url)
.then(r=>r.json())
.then(data=>{

  if(!data || data.length===0){
    alert("❌ Không có dữ liệu từ API");
    return;
  }

  let tbody=document.getElementById("tbody");

  let tong=0,trong=0,gia=0,doanhthu=0;
  let buildingMap={};

  let html="";
  let current="";

  data.forEach(r=>{

    if(!r.toa) return;

    if(current!==r.toa){
      current=r.toa;
      html+=`
      <tr class="building">
        <td colspan="8">${current}</td>
      </tr>`;
    }

    let dt=Number(r.dientich)||0;
    let g=Number(r.gia)||0;
    let doanh=dt*g*24000;

    tong+=dt;
    trong+=dt;
    gia+=g;
    doanhthu+=doanh;

    if(!buildingMap[r.toa]) buildingMap[r.toa]=0;
    buildingMap[r.toa]+=dt;

    html+=`
    <tr>
      <td>${r.toa}</td>
      <td>${r.tang||""}</td>
      <td>${dt.toLocaleString()}</td>
      <td>${g}</td>
      <td class="red">${r.uudai||""}</td>
      <td>${r.phi||""}</td>
      <td>${doanh.toLocaleString()}</td>
      <td class="green">${r.trangthai||""}</td>
    </tr>`;
  });

  tbody.innerHTML=html;

  // KPI
  document.getElementById("tong").innerText=tong.toLocaleString()+" m²";
  document.getElementById("trong").innerText=trong.toLocaleString()+" m²";
  document.getElementById("gia").innerText=(gia/data.length).toFixed(1)+" USD";
  document.getElementById("doanhthu").innerText=doanhthu.toLocaleString()+" VND";

  // destroy chart cũ
  if(chartBar) chartBar.destroy();
  if(chartPie) chartPie.destroy();

  let labels=Object.keys(buildingMap);
  let values=Object.values(buildingMap);

  chartBar=new Chart(document.getElementById("chartBar"),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:'Diện tích trống',
        data:values
      }]
    },
    options:{responsive:true}
  });

  chartPie=new Chart(document.getElementById("chartPie"),{
    type:'pie',
    data:{
      labels:['Đã thuê','Còn trống'],
      datasets:[{
        data:[tong-trong,trong]
      }]
    }
  });

})
.catch(err=>{
  console.error(err);
  alert("❌ Lỗi kết nối API");
});

</script>

</body>
</html>
