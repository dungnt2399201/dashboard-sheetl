<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky BI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#f1f5f9;margin:0}
.container{max-width:1400px;margin:auto;padding:20px}

h2{margin-bottom:10px}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px
}
.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.05)
}
.card.blue{border-left:6px solid #3b82f6}
.card.green{border-left:6px solid #22c55e}
.card.orange{border-left:6px solid #f59e0b}
.card.red{border-left:6px solid #ef4444}

.value{font-size:22px;font-weight:bold}

/* CHART */
.chart{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:20px
}

#pie{max-height:250px}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff
}
th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}
th{background:#e5e7eb}

.building{
background:#dbeafe;
font-weight:bold
}

.green{color:#16a34a;font-weight:bold}
.red{color:#dc2626;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>📊 PaxSky BI Dashboard</h2>

<div class="kpi">
<div class="card blue">Tổng DT<div id="tong" class="value"></div></div>
<div class="card green">% Lấp đầy<div id="fill" class="value"></div></div>
<div class="card orange">Giá TB<div id="gia" class="value"></div></div>
<div class="card red">Doanh thu<div id="doanh" class="value"></div></div>
</div>

<div class="chart"><canvas id="bar"></canvas></div>
<div class="chart"><canvas id="pie"></canvas></div>
<div class="chart"><canvas id="trend"></canvas></div>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Giá thuê</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

let barChart,pieChart,trendChart;

fetch(API)
.then(r=>r.json())
.then(data=>{

let tong=0,trong=0,da=0,gia=0,doanh=0;

let mapTrong={},mapDa={};

let html="";
let current="";

data.forEach(r=>{

let dt=Number(r.dientich)||0;
let g=Number(r.gia)||0;

let isTrong=(r.trangthai||"").includes("TRỐNG");

if(isTrong){
trong+=dt;
mapTrong[r.toa]=(mapTrong[r.toa]||0)+dt;
}else{
da+=dt;
mapDa[r.toa]=(mapDa[r.toa]||0)+dt;
}

tong+=dt;
gia+=g;
doanh+=dt*g*24000;

if(current!==r.toa){
current=r.toa;
html+=`<tr class="building"><td colspan="8">${current}</td></tr>`;
}

html+=`
<tr>
<td>${r.toa}</td>
<td>${r.tang}</td>
<td>${dt.toLocaleString()}</td>
<td>${g}</td>
<td class="red">${r.uudai||""}</td>
<td>${r.phi||""}</td>
<td>${(dt*g*24000).toLocaleString()}</td>
<td class="green">${r.trangthai}</td>
</tr>`;
});

document.getElementById("tbody").innerHTML=html;

// KPI
let fill=(da/tong*100)||0;

document.getElementById("tong").innerText=tong.toLocaleString()+" m²";
document.getElementById("fill").innerText=fill.toFixed(1)+"%";
document.getElementById("gia").innerText=(gia/data.length).toFixed(1)+" USD";
document.getElementById("doanh").innerText=doanh.toLocaleString()+" VND";

// DESTROY OLD
if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();
if(trendChart) trendChart.destroy();

let buildings=[...new Set(data.map(x=>x.toa))];

// ===== BAR STACKED =====
barChart=new Chart(bar,{
type:'bar',
data:{
labels:buildings,
datasets:[
{
label:'Đã thuê',
data:buildings.map(x=>mapDa[x]||0),
backgroundColor:'#3b82f6'
},
{
label:'Còn trống',
data:buildings.map(x=>mapTrong[x]||0),
backgroundColor:'#ef4444'
}
]
},
options:{
scales:{x:{stacked:true},y:{stacked:true}}
}
});

// ===== PIE =====
pieChart=new Chart(pie,{
type:'pie',
data:{
labels:['Đã thuê','Còn trống'],
datasets:[{
data:[da,trong],
backgroundColor:['#3b82f6','#ef4444']
}]
}
});

// ===== TREND BAR 3 THÁNG =====
trendChart=new Chart(trend,{
type:'bar',
data:{
labels:['Tháng 1','Tháng 2','Tháng 3'],
datasets:[
{
label:'Giá thuê (USD)',
data:[20,21,22]
},
{
label:'Lấp đầy (%)',
data:[70,75,80]
}
]
},
options:{
plugins:{legend:{position:'bottom'}},
scales:{y:{beginAtZero:true}}
}
});

})
.catch(err=>{
console.error(err);
alert("❌ Lỗi API");
});

</script>

</body>
</html>
