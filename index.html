<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky PRO</title>

<style>
body{font-family:Arial;background:#f1f5f9;margin:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#e5e7eb}
.building{background:#dbeafe;font-weight:bold}
.green{color:#16a34a;font-weight:bold}
</style>
</head>

<body>

<h2>🏢 PaxSky Leasing PRO</h2>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Ưu đãi</th>
<th>Phí</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

// 🔥 DÁN LINK API CỦA BẠN
const url="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

fetch(url)
.then(r=>r.json())
.then(data=>{

  let html="";
  let current="";

  data.forEach(r=>{

    if(current!==r.toa){
      current=r.toa;
      html+=`
      <tr class="building">
        <td colspan="7">${current}</td>
      </tr>`;
    }

    html+=`
    <tr>
      <td>${r.toa}</td>
      <td>${r.tang}</td>
      <td>${r.dientich}</td>
      <td>${r.gia}</td>
      <td>${r.uudai}</td>
      <td>${r.phi}</td>
      <td class="green">${r.trangthai}</td>
    </tr>`;
  });

  document.getElementById("tbody").innerHTML=html;

});

</script>

</body>
</html>
