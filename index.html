<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f1f5f9}

.layout{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#0f172a;
  color:#fff;
  height:100vh;
  padding:20px;
}

.sidebar h3{margin-bottom:20px}

.menu div{
  padding:10px;
  cursor:pointer;
}

.menu div:hover{
  background:#1e293b;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:8px;
}

.value{font-size:20px;font-weight:bold}

/* TABLE */
table{
  width:100%;
  background:#fff;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th{background:#e5e7eb}

.green{color:green;font-weight:bold}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h3>PaxSky</h3>
  <div class="menu">
    <div onclick="showPage('dashboard')">📊 Dashboard</div>
    <div onclick="showPage('leasing')">🏢 Leasing</div>
    <div onclick="showPage('crm')">👥 CRM</div>
  </div>
</div>

<div class="main">

<div id="dashboard">

<h2>Dashboard</h2>

<div class="kpi">
  <div class="card">Tổng DT<div id="tong" class="value"></div></div>
  <div class="card">Trống<div id="trong" class="value"></div></div>
  <div class="card">Giá TB<div id="gia" class="value"></div></div>
  <div class="card">Doanh thu<div id="doanh" class="value"></div></div>
</div>

<canvas id="chart"></canvas>

</div>

<div id="leasing" style="display:none">

<h2>Quản lý mặt bằng</h2>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<div id="crm" style="display:none">
<h2>CRM (đang phát triển)</h2>
</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

function showPage(id){
  document.querySelectorAll(".main > div")
  .forEach(d=>d.style.display="none");
  document.getElementById(id).style.display="block";
}

fetch(API)
.then(r=>r.json())
.then(data=>{

  let tong=0,trong=0,gia=0,doanh=0;
  let map={};

  let html="";

  data.forEach(r=>{

    let dt=r.dientich||0;
    let g=r.gia||0;

    tong+=dt;
    trong+=dt;
    gia+=g;
    doanh+=dt*g*24000;

    if(!map[r.toa]) map[r.toa]=0;
    map[r.toa]+=dt;

    html+=`
    <tr>
      <td>${r.toa}</td>
      <td>${r.tang}</td>
      <td>${dt}</td>
      <td>${g}</td>
      <td class="green">${r.trangthai}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML=html;

  document.getElementById("tong").innerText=tong;
  document.getElementById("trong").innerText=trong;
  document.getElementById("gia").innerText=(gia/data.length).toFixed(1);
  document.getElementById("doanh").innerText=doanh.toLocaleString();

  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:Object.keys(map),
      datasets:[{data:Object.values(map)}]
    }
  });

});

</script>

</body>
</html>
