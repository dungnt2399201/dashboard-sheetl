<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PaxSky BI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Segoe UI;background:#f1f5f9;margin:0}
.container{max-width:1400px;margin:auto;padding:20px}

h2{margin-bottom:10px}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px
}
.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.05)
}
.value{font-size:22px;font-weight:bold}

/* FILTER */
.filter{
margin-bottom:15px
}

/* CHART */
.chart{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:20px
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff
}
th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}
th{background:#e5e7eb}

/* ALERT */
.alert{
background:#fee2e2;
padding:10px;
border-radius:8px;
margin-bottom:10px;
color:#b91c1c;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 PaxSky BI Dashboard</h2>

<div class="filter">
<select id="filter">
<option value="">Tất cả tòa</option>
</select>
</div>

<div id="alertBox"></div>

<div class="kpi">
<div class="card">Tổng DT<div id="tong" class="value"></div></div>
<div class="card">% Lấp đầy<div id="fill" class="value"></div></div>
<div class="card">Giá TB<div id="gia" class="value"></div></div>
<div class="card">Doanh thu<div id="doanh" class="value"></div></div>
</div>

<div class="chart"><canvas id="bar"></canvas></div>
<div class="chart"><canvas id="pie"></canvas></div>
<div class="chart"><canvas id="trend"></canvas></div>

<table>
<thead>
<tr>
<th>Tòa</th>
<th>Tầng</th>
<th>Diện tích</th>
<th>Giá</th>
<th>Trạng thái</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxqthyjErEcmmnRK6Nz_PeMnNCWmeA7DGAnbZiehbFcYDIxU1ZCb_jocvApRa-i-oy36Q/exec";

let rawData=[];
let barChart,pieChart,trendChart;

fetch(API)
.then(r=>r.json())
.then(data=>{
rawData=data;
initFilter();
render(data);
});

function initFilter(){
let list=[...new Set(rawData.map(x=>x.toa))];
let f=document.getElementById("filter");

list.forEach(x=>{
f.innerHTML+=`<option value="${x}">${x}</option>`;
});

f.onchange=()=>{
let val=f.value;
render(val?rawData.filter(x=>x.toa===val):rawData);
}
}

function render(data){

let tong=0,trong=0,da=0,gia=0,doanh=0;

let mapTrong={},mapDa={};

let html="";
let current="";

data.forEach(r=>{

let dt=Number(r.dientich)||0;
let g=Number(r.gia)||0;

let isTrong=(r.trangthai||"").includes("TRỐNG");

if(isTrong){
trong+=dt;
mapTrong[r.toa]=(mapTrong[r.toa]||0)+dt;
}else{
da+=dt;
mapDa[r.toa]=(mapDa[r.toa]||0)+dt;
}

tong+=dt;
gia+=g;
doanh+=dt*g*24000;

if(current!==r.toa){
current=r.toa;
html+=`<tr><td colspan="5"><b>${current}</b></td></tr>`;
}

html+=`
<tr>
<td>${r.toa}</td>
<td>${r.tang}</td>
<td>${dt}</td>
<td>${g}</td>
<td>${r.trangthai}</td>
</tr>`;
});

document.getElementById("tbody").innerHTML=html;

// KPI
let fill=((da/tong)*100)||0;

document.getElementById("tong").innerText=tong.toLocaleString();
document.getElementById("fill").innerText=fill.toFixed(1)+"%";
document.getElementById("gia").innerText=(gia/data.length).toFixed(1);
document.getElementById("doanh").innerText=doanh.toLocaleString();

// ALERT
if(fill<70){
document.getElementById("alertBox").innerHTML=
`<div class="alert">⚠️ Tỷ lệ lấp đầy thấp (${fill.toFixed(1)}%)</div>`;
}else{
document.getElementById("alertBox").innerHTML="";
}

// CHART
if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();
if(trendChart) trendChart.destroy();

let labels=[...new Set(data.map(x=>x.toa))];

barChart=new Chart(bar,{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'Đã thuê',data:labels.map(x=>mapDa[x]||0)},
{label:'Trống',data:labels.map(x=>mapTrong[x]||0)}
]
},
options:{scales:{x:{stacked:true},y:{stacked:true}}}
});

pieChart=new Chart(pie,{
type:'pie',
data:{
labels:['Đã thuê','Trống'],
datasets:[{data:[da,trong]}]
}
});

// TREND GIẢ LẬP (nâng cấp sau)
trendChart=new Chart(trend,{
type:'line',
data:{
labels:['T1','T2','T3'],
datasets:[
{label:'Giá',data:[20,21,22]},
{label:'Lấp đầy %',data:[70,75,80]}
]
}
});

}

</script>

</body>
</html>
